<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home IT Service</title>

    <!-- ✅ Favicon über Datei -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">

    <style>
        :root { --accent: #4da3ff; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #e6e6e6;

            background:
                linear-gradient(rgba(0,0,0,0.40), rgba(0,0,0,0.40)),
                url("background.jpg") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            max-width: 520px;
            width: 90%;
            text-align: center;

            background: rgba(20, 20, 20, 0.62);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            padding: 50px 60px;
            border-radius: 18px;
            box-shadow: 0 0 45px rgba(0,0,0,0.8);
        }

        .logo {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .services {
            list-style: none;
            padding: 0;
            margin: 0 0 35px 0;
            font-size: 20px;
            line-height: 1.8;
        }

        .services li::before {
            content: "• ";
            color: var(--accent);
        }

        .contact {
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 25px;
            font-size: 18px;
        }

        .contact p { margin: 8px 0; }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .logo { font-size: 34px; }
            .services { font-size: 18px; }
            .container { padding: 35px 25px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Home IT Service</div>

        <ul class="services">
            <li>Netzwerkinstallationen</li>
            <li>Smart Home</li>
            <li>KNX Programmierungen</li>
            <li>Visualisierungen</li>
            <li>Computer Hard‑ &amp; Software</li>
        </ul>

        <div class="contact">
            <p>Kontakt:</p>

            <!-- ✅ Spam-geschützter E-Mail-Link (Adresse nicht im HTML als mailto vorhanden) -->
            <p>
                <a class="email-protect"
                   href="#"
                   data-user="home-it-service"
                   data-domain="outlook.at"
                   aria-label="E-Mail senden">
                   E-Mail senden
                </a>
            </p>

            <p>Adresse:</p>
            <p>2070 Retz</p>
        </div>
    </div>

    <!-- ✅ JS setzt sichtbaren Text + klickbares mailto erst nach dem Laden -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const links = document.querySelectorAll(".email-protect");
            links.forEach(link => {
                const user = link.getAttribute("data-user");
                const domain = link.getAttribute("data-domain");
                const email = user + "@" + domain;

                // Sichtbarer Text für Menschen
                link.textContent = email;

                // Klick öffnet Mailprogramm
                link.addEventListener("click", function (e) {
                    e.preventDefault();
                    window.location.href = "mailto:" + email;
                });
            });
        });
    </script>
</body>
</html>
